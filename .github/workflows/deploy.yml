name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install pandas matplotlib seaborn azure-storage-blob

      - name: Run data analysis script
        run: python data_analysis.py

      - name: Build Docker image
        run: docker build -t nutritional-insights:latest .

      - name: Save Docker image as artifact
        run: docker save nutritional-insights:latest -o nutritional-insights.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: nutritional-insights-image
          path: nutritional-insights.tar

      - name: Simulate deployment
        run: echo "Deployment complete - Docker image saved and uploaded as artifact!"